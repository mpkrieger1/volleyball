name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build workspaces
        run: npm run build

      - name: Playwright smoke (Electron)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 7

      - name: Package Windows installer
        env:
          # Sprint 24: signing is opt-in. Both secrets must be set in
          # repo Settings for the build to sign — see
          # docs/release/code-signing.md. Empty values yield unsigned.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run build:installer

      - name: Verify installer size budget
        run: npm run test:installer-size

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcd-windows-installer
          path: |
            release/*.exe
            release/*.blockmap
          retention-days: 14
          if-no-files-found: error
